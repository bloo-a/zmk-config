# Keep both USB + BLE functionality
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Pin USB HID poll interval (usually already 1 ms)
CONFIG_USB_HID_POLL_INTERVAL_MS=1

# Debounce tuning (start here, then reduce press if stable)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=2
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=4

# Split battery monitoring support
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
